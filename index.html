<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CE I Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-brand">CE I</div>
      <h1>Dashboard</h1>
      <p class="login-sub">Creative Entrepreneurship</p>
      <button id="btn-google-login" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Sign in with Google
      </button>
      <p id="login-error" class="error-msg hidden"></p>
    </div>
  </div>

  <!-- App (hidden until logged in) -->
  <div id="app" class="hidden">

    <aside class="sidebar">
      <div class="sidebar-brand">CE I</div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-view="dashboard">
          <span class="nav-icon">⊟</span> Dashboard
        </button>
        <button class="nav-btn" data-view="kanban">
          <span class="nav-icon">⊞</span> Kanban
        </button>
        <button class="nav-btn" data-view="tasks">
          <span class="nav-icon">✓</span> Tasks
        </button>
      </nav>
      <div class="sidebar-user">
        <img id="user-avatar" src="" alt="" />
        <div class="user-details">
          <span id="user-name"></span>
          <button id="btn-logout">Sign out</button>
        </div>
      </div>
    </aside>

    <main class="main-content">

      <!-- Dashboard -->
      <div id="view-dashboard" class="view">
        <div class="view-header">
          <h2>Overview</h2>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Tasks</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">In Progress</div>
            <div class="stat-value" id="stat-inprogress">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Completed</div>
            <div class="stat-value" id="stat-done">0</div>
          </div>
        </div>
      </div>

      <!-- Kanban -->
      <div id="view-kanban" class="view hidden">
        <div class="view-header">
          <h2>Kanban Board</h2>
          <button id="btn-add-card" class="btn btn-primary">+ New card</button>
        </div>
        <div class="kanban-board">
          <div class="kanban-col" data-col="backlog">
            <div class="col-header"><span class="col-dot dot-gray"></span>Backlog</div>
            <div class="col-cards" id="col-backlog"></div>
          </div>
          <div class="kanban-col" data-col="inprogress">
            <div class="col-header"><span class="col-dot dot-green"></span>In Progress</div>
            <div class="col-cards" id="col-inprogress"></div>
          </div>
          <div class="kanban-col" data-col="done">
            <div class="col-header"><span class="col-dot dot-teal"></span>Done</div>
            <div class="col-cards" id="col-done"></div>
          </div>
        </div>
      </div>

      <!-- Tasks -->
      <div id="view-tasks" class="view hidden">
        <div class="view-header">
          <h2>Tasks</h2>
          <button id="btn-add-task" class="btn btn-primary">+ New task</button>
        </div>
        <div class="task-list" id="task-list"></div>
      </div>

    </main>
  </div>

  <!-- New Card Modal -->
  <div id="modal-card" class="modal hidden">
    <div class="modal-box">
      <h3>New Card</h3>
      <label>Title<input id="card-title" class="input" type="text" placeholder="Card title" /></label>
      <label>Column
        <select id="card-col" class="input">
          <option value="backlog">Backlog</option>
          <option value="inprogress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </label>
      <label>Assignee<input id="card-assignee" class="input" type="text" placeholder="Name" /></label>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-cancel-card">Cancel</button>
        <button class="btn btn-primary" id="btn-save-card">Save</button>
      </div>
    </div>
  </div>

  <!-- New Task Modal -->
  <div id="modal-task" class="modal hidden">
    <div class="modal-box">
      <h3>New Task</h3>
      <label>Title<input id="task-title" class="input" type="text" placeholder="Task title" /></label>
      <label>Assignee<input id="task-assignee" class="input" type="text" placeholder="Name" /></label>
      <label>Due date<input id="task-due" class="input" type="date" /></label>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-cancel-task">Cancel</button>
        <button class="btn btn-primary" id="btn-save-task">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
